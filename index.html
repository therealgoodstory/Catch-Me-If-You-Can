<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Catch Me If You Can</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: #f1f1f1;
                color: #fff;
                font-family: monospace;
            }

            svg {
                pointer-events: all;
            }

            path {
                pointer-events: all;
            }

            #search-bar {
                position: fixed;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%);
                width: 500px;
                z-index: 10;
            }

            #search-bar {
                position: fixed;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%);
                width: 500px;
                z-index: 10;
                display: flex;
                align-items: center;
                background: rgba(255, 255, 255, 0.95);
                border-radius: 4px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            }

            #search-btn {
                padding: 16px 24px;
                background: #1e3a5f;
                border: none;
                border-radius: 4px;
                color: #fff;
                font-size: 18px;
                cursor: pointer;
            }

            #search-btn:hover {
                background: #4a9eff;
            }

            #search-input {
                flex: 1;
                padding: 16px 24px;
                background: transparent;
                border: none;
                color: #0d1117;
                font-family: monospace;
                font-size: 18px;
                outline: none;
            }

            #search-input::placeholder {
                color: #888;
            }

            #search-btn {
                padding: 16px 20px;
                background: transparent;
                border: none;
                border-left: 1px solid #ddd;
                color: #1e3a5f;
                font-size: 18px;
                cursor: pointer;
            }

            #search-btn:hover {
                color: #4a9eff;
            }

            #clear-btn {
                padding: 16px 20px;
                background: transparent;
                border: none;
                border-right: 1px solid #ddd;
                color: #888;
                font-size: 18px;
                cursor: pointer;
            }

            #clear-btn:hover {
                color: #ff4444;
            }

            #map {
                width: 100vw;
                height: 100vh;
                overflow: hidden;
            }
        </style>
    </head>
    <body>
        <!--map-->
        <div id="map"></div>
        <!--input search country-->
        <div id="search-bar">
            <input
                type="text"
                id="search-input"
                placeholder="Search country..."
            />
            <button id="clear-btn">✕</button>
            <button id="search-btn">→</button>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
        <script src="https://cdn.jsdelivr.net/npm/topojson@3"></script>
        <script src="data.js"></script>
        <script src="main.js"></script>

        <script src="countries_name_data.js"></script>
        <script src="search_input.js"></script>

        <!--<script>
            // HERE

        </script>-->
    </body>
</html>
